name: Code Review Pipeline

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: code-review-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------
  # Job 1: Run tests and upload coverage
  # -----------------------------------------------------------
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx vitest run --coverage --reporter=json --outputFile=test-results.json
        continue-on-error: false

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.json
          retention-days: 14

  # -----------------------------------------------------------
  # Job 2: Security scan with Semgrep
  # -----------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/typescript
            p/nodejs
            p/owasp-top-ten
            p/security-audit
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Run Semgrep (SARIF output)
        run: |
          pip install semgrep
          semgrep scan \
            --config auto \
            --sarif \
            --output semgrep-results.sarif \
            . || true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif

      - name: Upload Semgrep results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.sarif
          retention-days: 14

  # -----------------------------------------------------------
  # Job 3: Post results as a PR comment
  # -----------------------------------------------------------
  report:
    name: PR Report
    runs-on: ubuntu-latest
    needs: [test, security]
    if: always()

    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: ./artifacts
        continue-on-error: true

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: ./artifacts/coverage
        continue-on-error: true

      - name: Download Semgrep results
        uses: actions/download-artifact@v4
        with:
          name: semgrep-results
          path: ./artifacts
        continue-on-error: true

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // ---- Gather test results ----
            let testSummary = 'No test results found.';
            try {
              const raw = fs.readFileSync('./artifacts/test-results.json', 'utf8');
              const results = JSON.parse(raw);
              const total = results.numTotalTests || 0;
              const passed = results.numPassedTests || 0;
              const failed = results.numFailedTests || 0;
              const icon = failed > 0 ? ':x:' : ':white_check_mark:';
              testSummary = `${icon} **${passed}/${total}** tests passed, **${failed}** failed`;
            } catch {
              testSummary = ':warning: Could not parse test results.';
            }

            // ---- Gather coverage ----
            let coverageSummary = 'No coverage data found.';
            try {
              const raw = fs.readFileSync('./artifacts/coverage/coverage-summary.json', 'utf8');
              const cov = JSON.parse(raw);
              const total = cov.total || {};
              const lines = total.lines?.pct ?? 'N/A';
              const branches = total.branches?.pct ?? 'N/A';
              const functions = total.functions?.pct ?? 'N/A';
              const statements = total.statements?.pct ?? 'N/A';
              coverageSummary = [
                `| Metric     | Coverage |`,
                `|------------|----------|`,
                `| Lines      | ${lines}% |`,
                `| Branches   | ${branches}% |`,
                `| Functions  | ${functions}% |`,
                `| Statements | ${statements}% |`,
              ].join('\n');
            } catch {
              coverageSummary = ':warning: Could not parse coverage data.';
            }

            // ---- Gather Semgrep findings ----
            let securitySummary = 'No security scan results found.';
            try {
              const raw = fs.readFileSync('./artifacts/semgrep-results.sarif', 'utf8');
              const sarif = JSON.parse(raw);
              const results = sarif.runs?.[0]?.results || [];
              const count = results.length;
              if (count === 0) {
                securitySummary = ':white_check_mark: No security issues found.';
              } else {
                const high = results.filter(r => r.level === 'error').length;
                const medium = results.filter(r => r.level === 'warning').length;
                const low = results.filter(r => r.level === 'note').length;
                securitySummary = [
                  `:warning: **${count}** issue(s) found`,
                  `| Severity | Count |`,
                  `|----------|-------|`,
                  `| High     | ${high} |`,
                  `| Medium   | ${medium} |`,
                  `| Low      | ${low} |`,
                ].join('\n');
              }
            } catch {
              securitySummary = ':warning: Could not parse security scan results.';
            }

            // ---- Build comment ----
            const testStatus = '${{ needs.test.result }}';
            const securityStatus = '${{ needs.security.result }}';
            const overall = (testStatus === 'success' && securityStatus === 'success')
              ? ':white_check_mark: All checks passed'
              : ':x: Some checks failed';

            const body = [
              `## Code Review Report`,
              ``,
              `${overall}`,
              ``,
              `### Tests`,
              testSummary,
              ``,
              `### Coverage`,
              coverageSummary,
              ``,
              `### Security Scan`,
              securitySummary,
              ``,
              `---`,
              `*Generated by the Code Review Pipeline*`,
            ].join('\n');

            // ---- Post or update comment ----
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('## Code Review Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
